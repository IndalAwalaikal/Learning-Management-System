

services:
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: lms-server
    ports:
      - "5000:5000"
    env_file:
      - ./Server/.env
    volumes:
      - ./Server/uploads:/app/uploads
    restart: unless-stopped

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: lms-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    restart: unless-stopped

